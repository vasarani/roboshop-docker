services: 
    mongodb:
       build: ./mongodb
       image: vasaraniakshaya/mongodb:1.0.0
       container_name: mongodb
       volumes: 
       - /:data/db

    mysql:
       build: ./mysql
       image: vasaraniakshaya/mysql:1.0.0
       container_name: mysql
       volumes:
       - mysql:/var/lib/mysql 

    rabbitmq:
        image: rabbitmq:3
        environment: 
            RABBITMQ_DEFAULT_USER: roboshop
            RABBITMQ_DEFAULT_PASS: roboshop123
        container_name: rabbitmq
        volumes:
        - rabbitmq:/var/lib/rabbitmq 

    redis:
      image: redis:7.0
      container_name: redis
      volumes:
      - redis:/data 

    catalogue:
       build: ./catalogue
       image: vasaraniakshaya/catalogue:1.0.0
       container_name: catalogue
       depends_on: 
        - mongodb

    cart:
      build: ./cart
      image: vasaraniakshaya/cart:1.0.0
      container_name: cart
      depends_on:
        - redis
        - catalogue

    user:
       build: ./user
       image: vasaraniakshaya/user:1.0.0
       container_name: user
       depends_on:
         - redis
         - mongodb

    shipping:
       build: ./shipping
       image: vasaraniakshaya/shipping:1.0.0
       container_name: shipping
       depends_on:
         - mysql
         - cart

    payment:
        build: ./payment
        image: vasaraniakshaya/payment:1.0.0
        container_name: payment
        environment: 
            CART_HOST: "cart"
            CART_PORT: "8080"
            USER_HOST: "user"
            USER_PORT: "8080"
            AMQP_HOST: "rabbitmq"
            AMQP_USER: "roboshop"
            AMQP_PASS: "roboshop123"
        depends_on:
          - rabbitmq
          - cart
          - user 

    frontend:
       build: ./frontend
       image: vasaraniakshaya/frontend:1.0.0
       container_name: frontend
       ports: 
         - "80:80"
       depends_on:
          - catalogue
          - cart
          - user 
          - shipping 
          - payment 


networks:
    defaults:
        driver: bridge
        name: roboshop
        external: false # if true, we need to create network manually
volumes:
   mongodb:
   mysql:
   rabbitmq:
   redis:         

